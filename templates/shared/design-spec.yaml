# Design spec v1 — /legacy-spec and /spec (round 1)
# Do NOT add codegen, ui.filters, ui.columns, or portal-gen tags here.
# After /grill-with-docs → see docs/templates/spec.yaml (portal-gen-ready).

id: role-page-function
title: Feature title
status: draft
owner: portal-team
summary: Short business summary for BA, QA, dev, and AI.

actors: []
# - id: admin
#   legacyRoleCode: master

entities: []
# - name: Entity
#   table: entities
#   importantFields: [id, name, created_at]

relationships: []

requirements:
  - id: REQ-FEATURE-001
    title: Main behavior
    description: User can complete the main behavior.
    priority: must

ui:
  routes:
    - path: /feature-path
      legacyPath: /legacy/path
      pageTestId: feature-page
  # Page profiles for design v1. Keep prose short; move validation/source/message details to form fields.
  validationMessages:
    required: This field is required
    email: Email format is invalid
    phone: Phone number format is invalid
    minLength: Must be at least {n} characters
    maxLength: Must be at most {n} characters
    min: Must be at least {n}
    max: Must be at most {n}
    pattern: Invalid format
  list:
    columns: []
    filters: []
    rowActions: []
    bulkActions: []
    pagination:
      defaultPageSize: 20
      pageSizeOptions: [20, 50, 100]
  form:
    layout:
      mode: single-column # single-column | two-column | custom
    sections: []
    fields:
      # - key: name
      #   label: Name
      #   type: string
      #   widget: text
      #   required: true
      #   validation:
      #     maxLength: 255
      #   messages:
      #     required: Name is required.
  detail:
    header:
      titleField: name
      subtitleField: code
    sections: []
    actions:
      - id: edit
        text: Edit
      - id: delete
        text: Delete

api:
  endpoints:
    - method: GET
      path: /api/feature
      legacyPath: /legacy/path
      query: {}
      response: {}

acceptance:
  - Main behavior is testable end to end.

openQuestions: []

notes:
  - YAML is source of truth. Render with pnpm docs:render.
  - Portal-gen blocks added in /grill-with-docs — see .cursor/extracts/codegen/readiness.md
